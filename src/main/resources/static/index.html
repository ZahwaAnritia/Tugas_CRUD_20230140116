<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP Management | CRUD Dashboard</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --primary: #4361ee;
            --bg-body: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            padding-bottom: 5rem;
        }

        /* Header / Navbar Section */
        .brand-wrapper {
            padding: 4rem 0 3rem 0;
            text-align: center;
        }

        .brand-title {
            font-weight: 800;
            font-size: 3.2rem; /* Ukuran diperbesar */
            letter-spacing: -1.5px;
            color: var(--text-dark);
            margin-bottom: 0;
            line-height: 1;
        }

        .brand-title i {
            color: var(--primary);
            margin-right: 15px;
            font-size: 3.5rem;
            vertical-align: middle;
        }

        .brand-subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 12px;
            text-transform: uppercase;
        }

        /* Card Container */
        .content-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card-elegant {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 2.5rem;
            margin-bottom: 2.5rem;
        }

        /* Form Elements */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            background-color: #fff;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.08);
        }

        /* Button Styling */
        .btn-main {
            background-color: #1a1a1a;
            color: white;
            border-radius: 12px;
            padding: 0.85rem 2.5rem;
            font-weight: 700;
            border: none;
            transition: all 0.3s;
        }
        .btn-main:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            color: white;
        }
        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.85rem 1.5rem;
            border: none;
            text-decoration: none;
        }
        .btn-cancel:hover { color: #e11d48; }

        /* Table Styling */
        .table-minimal thead th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1.2rem 1rem;
            border: none;
        }
        .table-minimal tbody td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }
        .nik-font {
            font-family: 'Monaco', monospace;
            font-weight: 600;
            color: var(--primary);
            background: #f0f4ff;
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* Badge Gender */
        .badge-gender {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .male { background: #e0f2fe; color: #0369a1; }
        .female { background: #fdf2f8; color: #be185d; }

        /* Action Buttons */
        .btn-circle {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: all 0.2s;
            margin: 0 3px;
        }
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-edit:hover { background: #4361ee; color: white; }
        .btn-delete { background: #fff1f2; color: #e11d48; }
        .btn-delete:hover { background: #e11d48; color: white; }

    </style>
</head>
<body>


<header class="brand-wrapper">
    <div class="container">
        <div class="brand-title">
            <i class="fas fa-fingerprint"></i>KTP MANAGEMENT
        </div>
        <div class="brand-subtitle">
            Sistem Manajemen Data Kependudukan
        </div>
    </div>
</header>

<div class="container content-container">

    <!-- Bagian Form (Atas) -->
    <div class="card-elegant">
        <h5 class="fw-bold mb-4 text-center">Registrasi Data Penduduk</h5>

        <form id="ktpForm">
            <input type="hidden" id="ktpId">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Nomor KTP (NIK)</label>
                    <input type="text" id="nomorKtp" class="form-control" placeholder="16 Digit NIK" maxlength="16" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="namaLengkap" class="form-control" placeholder="Nama Sesuai Identitas" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Alamat Domisili</label>
                    <input type="text" id="alamat" class="form-control" placeholder="Jl. Nama Jalan, Kota, Provinsi">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" id="tanggalLahir" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Kelamin</label>
                    <select id="jenisKelamin" class="form-select" required>
                        <option value="">Pilih Gender...</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div class="col-12 text-center mt-5">
                    <button type="submit" id="btnSubmit" class="btn-main">
                        <i class="fas fa-check-circle me-2"></i>Simpan Data
                    </button>
                    <!-- Tombol Batal Tersembunyi di Awal -->
                    <button type="button" id="btnCancel" class="btn-cancel ms-3 d-none" onclick="resetForm()">Batal</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Bagian Tabel (Bawah) -->
    <div class="d-flex justify-content-between align-items-end mb-4 px-2">
        <div>
            <h5 class="fw-bold m-0">Daftar Penduduk</h5>
            <p class="text-muted small m-0">Data yang terverifikasi dalam sistem</p>
        </div>
        <span class="badge bg-white text-dark border px-3 py-2 rounded-pill shadow-sm" id="dataCount">0 Data</span>
    </div>

    <div class="card-elegant p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-minimal table-hover mb-0">
                <thead>
                <tr>
                    <th>NIK</th>
                    <th>Nama Lengkap</th>
                    <th>Domisili</th>
                    <th>Gender</th>
                    <th class="text-center">Aksi</th>
                </tr>
                </thead>
                <tbody id="ktpTableBody">
                <!-- Data via AJAX -->
                </tbody>
            </table>
        </div>

        <div id="emptyState" class="text-center py-5 d-none">
            <i class="fas fa-folder-open fa-3x text-light mb-3"></i>
            <p class="text-muted">Database kosong. Silakan tambah data baru.</p>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    // Notifikasi Toast
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
    });

    $(document).ready(function() {
        loadData();
        $("#ktpForm").submit(function(e) {
            e.preventDefault();
            saveData();
        });
    });

    function loadData() {
        $.get(API_URL, function(data) {
            $("#dataCount").text(data.length + " Data Terdaftar");
            if (data.length === 0) {
                $("#emptyState").removeClass('d-none');
                $("#ktpTableBody").html("");
                return;
            }
            $("#emptyState").addClass('d-none');

            let html = "";
            data.forEach(ktp => {
                let badgeClass = ktp.jenisKelamin === 'Laki-laki' ? 'male' : 'female';
                html += `
                    <tr>
                        <td><span class="nik-font">${ktp.nomorKtp}</span></td>
                        <td><span class="fw-bold">${ktp.namaLengkap}</span></td>
                        <td><span class="text-muted small">${ktp.alamat}</span></td>
                        <td><span class="badge-gender ${badgeClass}">${ktp.jenisKelamin}</span></td>
                        <td class="text-center">
                            <button class="btn-circle btn-edit" onclick="editData(${ktp.id})">
                                <i class="fas fa-pencil-alt fa-sm"></i>
                            </button>
                            <button class="btn-circle btn-delete" onclick="deleteData(${ktp.id})">
                                <i class="fas fa-trash-alt fa-sm"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            $("#ktpTableBody").html(html);
        });
    }

    function saveData() {
        let id = $("#ktpId").val();
        let payload = {
            nomorKtp: $("#nomorKtp").val(),
            namaLengkap: $("#namaLengkap").val(),
            alamat: $("#alamat").val(),
            tanggalLahir: $("#tanggalLahir").val(),
            jenisKelamin: $("#jenisKelamin").val()
        };

        $.ajax({
            url: id ? `${API_URL}/${id}` : API_URL,
            type: id ? "PUT" : "POST",
            contentType: "application/json",
            data: JSON.stringify(payload),
            success: function(res) {
                Toast.fire({ icon: 'success', title: res.message });
                resetForm();
                loadData();
            },
            error: function(err) {
                let msg = err.responseJSON ? err.responseJSON.message : "Gagal memproses data";
                Swal.fire({ icon: 'error', title: 'Error', text: msg, confirmButtonColor: '#1a1a1a' });
            }
        });
    }

    function editData(id) {
        $.get(`${API_URL}/${id}`, function(ktp) {
            $("#ktpId").val(ktp.id);
            $("#nomorKtp").val(ktp.nomorKtp).prop('disabled', true);
            $("#namaLengkap").val(ktp.namaLengkap);
            $("#alamat").val(ktp.alamat);
            $("#tanggalLahir").val(ktp.tanggalLahir);
            $("#jenisKelamin").val(ktp.jenisKelamin);

            // Perubahan UI Mode Update
            $("#btnSubmit").html('<i class="fas fa-sync me-2"></i>Update Data').css('background-color', '#4361ee');
            $("#btnCancel").removeClass('d-none'); // Tampilkan tombol Batal

            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function deleteData(id) {
        Swal.fire({
            title: 'Hapus data ini?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e11d48',
            confirmButtonText: 'Ya, Hapus',
            cancelButtonText: 'Batal',
            reverseButtons: true
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `${API_URL}/${id}`,
                    type: "DELETE",
                    success: function() {
                        Toast.fire({ icon: 'success', title: 'Data berhasil dihapus' });
                        loadData();
                    }
                });
            }
        })
    }

    function resetForm() {
        $("#ktpId").val("");
        $("#ktpForm")[0].reset();
        $("#nomorKtp").prop('disabled', false);


        $("#btnSubmit").html('<i class="fas fa-check-circle me-2"></i>Simpan Data').css('background-color', '#1a1a1a');
        $("#btnCancel").addClass('d-none');
</script>

</body>
</html>
